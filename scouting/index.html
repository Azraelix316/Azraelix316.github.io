<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Scouting Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .chart-container { position: relative; height: 100%; width: 100%; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- HEADER & SEARCH BAR -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-200">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-6">🤖 Scouting Dashboard</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Google Sheet URL (Must be "Anyone with link can view")</label>
                    <input type="text" id="sheetUrl" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="https://docs.google.com/spreadsheets/d/...">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Team Number</label>
                    <div class="flex gap-2">
                        <input type="text" id="teamNumber" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g. 254">
                        <button onclick="analyzeTeam()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                            Analyze
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="statusMessage" class="mt-4 text-sm font-semibold hidden"></div>
        </div>

        <!-- DASHBOARD CONTENT -->
        <div id="dashboard" class="hidden space-y-8">
            
            <!-- Header for Results -->
            <div class="text-center mb-8">
                <h2 id="reportTitle" class="text-4xl font-black text-slate-800 tracking-tight">TEAM XXXX</h2>
                <div class="inline-block mt-2 px-4 py-1 rounded-full bg-slate-100 border border-slate-300">
                    <span class="text-slate-600 font-bold uppercase tracking-wider text-sm" id="reportSubtitle">Typical Role: Unknown</span>
                </div>
                <div id="robotCapabilities" class="mt-4 flex justify-center gap-3"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Bar Chart -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200 h-[400px]">
                    <h3 class="text-lg font-bold text-slate-700 mb-4 text-center">Match Role Distribution</h3>
                    <div class="chart-container">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>

                <!-- Radar Chart -->
                <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200 h-[400px]">
                    <h3 class="text-lg font-bold text-slate-700 mb-4 text-center">Normalized Season Average</h3>
                    <div class="chart-container">
                        <canvas id="avgRadarChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Dynamic Grid for Individual Match Radars -->
            <div>
                <h3 class="text-2xl font-extrabold text-slate-800 mb-6 border-b pb-2">Individual Match History</h3>
                <div id="matchesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Charts injected here via JS -->
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & CONSTANTS ---
        const ROLES_MAP = {
            "Passer": { tendencies: { npass_time: 20.0, opass_time: 20.0 } },
            "Defense": { tendencies: { ndef_time: 20.0, odef_time: 20.0 } },
            "Scorer": { tendencies: { close_shot_time: 20.0, mid_shot_time: 20.0, far_shot_time: 15.0 } }
        };

        const ROLE_COLORS = {
            "Scorer": "rgba(231, 76, 60, 1)",   // Red
            "Defense": "rgba(46, 204, 113, 1)", // Green
            "Passer": "rgba(241, 196, 15, 1)",  // Yellow
            "Unknown": "rgba(149, 165, 166, 1)" // Grey
        };

        const NUMERIC_FIELDS = [
            'close_shot_time', 'mid_shot_time', 'far_shot_time',
            'traverse_time',
            'npass_time', 'opass_time', 'ndef_time', 'odef_time',
            'dysfunctional'
        ];

        let chartInstances = []; 

        // --- 2. DATA PROCESSING LOGIC ---

        function calculateRoleScore(dataObj, rolesMap) {
            let bestRole = "Unknown";
            let highestScore = -1.0;

            for (const [roleName, criteria] of Object.entries(rolesMap)) {
                const tendencies = criteria.tendencies || {};
                let ratios = [];
                
                for (const [attr, target] of Object.entries(tendencies)) {
                    let actual = dataObj[attr] || 0;
                    ratios.push(target > 0 ? (actual / target) : 0);
                }

                if (ratios.length > 0) {
                    let avgRatio = ratios.reduce((a, b) => a + b, 0) / ratios.length;
                    if (avgRatio > highestScore) {
                        highestScore = avgRatio;
                        bestRole = roleName;
                    }
                }
            }
            return { role: bestRole, score: highestScore.toFixed(2) };
        }

        // --- 3. MAIN EXECUTION ---

        async function analyzeTeam() {
            const rawUrl = document.getElementById('sheetUrl').value.trim();
            const teamNumber = document.getElementById('teamNumber').value.trim();
            
            if (!rawUrl || !teamNumber) {
                showMsg("Please enter both a Google Sheet URL and a Team Number.", "text-red-600");
                return;
            }

            let exportUrl = rawUrl;
            if (rawUrl.includes('/edit')) {
                exportUrl = rawUrl.replace(/\/edit.*$/, '/export?format=csv');
            } else if (!rawUrl.includes('/export')) {
                exportUrl += '/export?format=csv';
            }

            showMsg("Fetching and processing data...", "text-blue-600");

            Papa.parse(exportUrl, {
                download: true,
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    try {
                        processParsedData(results.data, teamNumber);
                        showMsg("", ""); 
                    } catch (e) {
                        console.error(e);
                        showMsg("Error processing data: " + e.message, "text-red-600");
                    }
                },
                error: function(err) {
                    showMsg("Failed to load Google Sheet. Ensure it is public ('Anyone with link').", "text-red-600");
                }
            });
        }

        function showMsg(text, classes) {
            const el = document.getElementById('statusMessage');
            el.textContent = text;
            el.className = `mt-4 text-sm font-semibold ${classes}`;
            if(text) el.classList.remove('hidden');
            else el.classList.add('hidden');
        }

        function processParsedData(rows, targetTeam) {
            // Correct Baseline Indices (Based exactly on your provided column list)
            let IDX = {
                close_shot_c: 26, close_shot_t: 27,
                mid_shot_c: 28, mid_shot_t: 29,
                far_shot_c: 30, far_shot_t: 31,
                bump_c: 32, bump_t: 33,
                trench_c: 34, trench_t: 35,
                trav_c: 36, trav_t: 37,
                npass_c: 38, npass_t: 39,
                ndef_c: 40, ndef_t: 41,
                opass_c: 42, opass_t: 43,
                odef_c: 44, odef_t: 45,
                dysfunctional: 52
            };

            // Bulletproof Dynamic Header Mapping (Exact Match to avoid Auton columns)
            if (rows.length > 0 && isNaN(parseInt(rows[0][0]))) {
                let headerRow = rows.shift();
                let hMap = {};
                
                // Make headers purely lowercase for case-insensitive exact matching
                headerRow.forEach((col, i) => hMap[String(col).trim().toLowerCase()] = i);
                
                // Helper: Find column that matches the EXACT name (ignoring case)
                const getExactIdx = (exactName, fallback) => {
                    let key = exactName.toLowerCase();
                    return hMap[key] !== undefined ? hMap[key] : fallback;
                };

                IDX.close_shot_c = getExactIdx('Close shot count', IDX.close_shot_c);
                IDX.close_shot_t = getExactIdx('Close shot time', IDX.close_shot_t);
                IDX.mid_shot_c = getExactIdx('Mid shot count', IDX.mid_shot_c);
                IDX.mid_shot_t = getExactIdx('Mid shot time', IDX.mid_shot_t);
                IDX.far_shot_c = getExactIdx('Far shot count', IDX.far_shot_c);
                IDX.far_shot_t = getExactIdx('Far shot time', IDX.far_shot_t);
                
                IDX.bump_c = getExactIdx('Bump count', IDX.bump_c);
                IDX.bump_t = getExactIdx('Bump time', IDX.bump_t);
                IDX.trench_c = getExactIdx('Trench count', IDX.trench_c);
                IDX.trench_t = getExactIdx('Trench time', IDX.trench_t);
                IDX.trav_c = getExactIdx('Traverse count', IDX.trav_c);
                IDX.trav_t = getExactIdx('Traverse time', IDX.trav_t);
                
                IDX.npass_c = getExactIdx('NPass count', IDX.npass_c);
                IDX.npass_t = getExactIdx('NPass time', IDX.npass_t);
                IDX.ndef_c = getExactIdx('NDef count', IDX.ndef_c);
                IDX.ndef_t = getExactIdx('NDef time', IDX.ndef_t);
                IDX.opass_c = getExactIdx('OPass count', IDX.opass_c);
                IDX.opass_t = getExactIdx('OPass time', IDX.opass_t);
                IDX.odef_c = getExactIdx('ODef count', IDX.odef_c);
                IDX.odef_t = getExactIdx('ODef time', IDX.odef_t);
                
                IDX.dysfunctional = getExactIdx('Dysfunctional', IDX.dysfunctional);
            }

            let matchHistory = [];

            rows.forEach(row => {
                if (row.length < 52) return; 
                
                // SWAPPED: Team is now index 1
                let teamStr = String(row[1]).trim();
                if (teamStr !== String(targetTeam).trim()) return;

                // Grab Times (converted from ms to seconds) dynamically using bulletproof IDX
                let close_shot_t = (parseFloat(row[IDX.close_shot_t]) || 0) / 1000;
                let mid_shot_t = (parseFloat(row[IDX.mid_shot_t]) || 0) / 1000;
                let far_shot_t = (parseFloat(row[IDX.far_shot_t]) || 0) / 1000;
                let bump_t = (parseFloat(row[IDX.bump_t]) || 0) / 1000;
                let trench_t = (parseFloat(row[IDX.trench_t]) || 0) / 1000;
                let trav_t = (parseFloat(row[IDX.trav_t]) || 0) / 1000;
                let npass_t = (parseFloat(row[IDX.npass_t]) || 0) / 1000;
                let ndef_t = (parseFloat(row[IDX.ndef_t]) || 0) / 1000;
                let opass_t = (parseFloat(row[IDX.opass_t]) || 0) / 1000;
                let odef_t = (parseFloat(row[IDX.odef_t]) || 0) / 1000;

                // Grab Counts dynamically using bulletproof IDX
                let close_shot_c = parseInt(row[IDX.close_shot_c]) || 0;
                let mid_shot_c = parseInt(row[IDX.mid_shot_c]) || 0;
                let far_shot_c = parseInt(row[IDX.far_shot_c]) || 0;
                let bump_c = parseInt(row[IDX.bump_c]) || 0;
                let trench_c = parseInt(row[IDX.trench_c]) || 0;
                let trav_c = parseInt(row[IDX.trav_c]) || 0;
                let npass_c = parseInt(row[IDX.npass_c]) || 0;
                let ndef_c = parseInt(row[IDX.ndef_c]) || 0;
                let opass_c = parseInt(row[IDX.opass_c]) || 0;
                let odef_c = parseInt(row[IDX.odef_c]) || 0;

                // Base Profile
                let profile = {
                    // SWAPPED: Match is now index 0
                    match_number: parseInt(row[0]) || 0,
                    close_shot_time: close_shot_t,
                    mid_shot_time: mid_shot_t,
                    far_shot_time: far_shot_t,
                    traverse_time: trav_t + bump_t + trench_t,
                    npass_time: npass_t,
                    opass_time: opass_t,
                    ndef_time: ndef_t,
                    odef_time: odef_t,
                    dysfunctional: (parseFloat(row[IDX.dysfunctional]) || 0) / 1000,
                    // Track if they did bump/trench in this match
                    is_bump: bump_t > 0 || bump_c > 0,
                    is_trench: trench_t > 0 || trench_c > 0,
                    is_dysfunctional: (parseFloat(row[IDX.dysfunctional]) || 0) > 0
                };

                // --- EFFICIENCY CALCULATIONS (Time / Count = Seconds per action) ---
                
                // Scoring Efficiency
                let scoringTime = close_shot_t + mid_shot_t + far_shot_t;
                let scoringCount = close_shot_c + mid_shot_c + far_shot_c;
                profile.scoring_eff = scoringCount > 0 ? (scoringTime / scoringCount) : null;

                // Traversal Efficiency
                let traversalTime = profile.traverse_time;
                let traversalCount = bump_c + trench_c + trav_c;
                profile.traversal_eff = traversalCount > 0 ? (traversalTime / traversalCount) : null;

                // Passing Efficiency
                let passingTime = npass_t + opass_t;
                let passingCount = npass_c + opass_c;
                profile.passing_eff = passingCount > 0 ? (passingTime / passingCount) : null;

                // Defense Efficiency
                let defenseTime = ndef_t + odef_t;
                let defenseCount = ndef_c + odef_c;
                profile.defense_eff = defenseCount > 0 ? (defenseTime / defenseCount) : null;

                // Analyze Match Role
                let result = calculateRoleScore(profile, ROLES_MAP);
                profile.assigned_role = result.role;
                profile.role_score = result.score;
                
                matchHistory.push(profile);
            });

            if (matchHistory.length === 0) {
                throw new Error(`No matches found for Team ${targetTeam}`);
            }

            // Aggregate Robot Data
            let roleCounts = { "Scorer": 0, "Passer": 0, "Defense": 0, "Unknown": 0 };
            let avgMetrics = {};
            NUMERIC_FIELDS.forEach(f => avgMetrics[f] = 0);

            matchHistory.forEach(m => {
                if (roleCounts[m.assigned_role] !== undefined) roleCounts[m.assigned_role]++;
                else roleCounts["Unknown"]++;
                NUMERIC_FIELDS.forEach(f => avgMetrics[f] += m[f]);
            });

            NUMERIC_FIELDS.forEach(f => avgMetrics[f] /= matchHistory.length);

            let typicalRole = calculateRoleScore(avgMetrics, ROLES_MAP).role;

            let maxVals = {};
            NUMERIC_FIELDS.forEach(f => {
                let robotMax = Math.max(...matchHistory.map(m => m[f]));
                let benchMax = 0;
                // Check our benchmarks to ensure the chart scales properly
                Object.keys(ROLES_MAP).forEach(role => {
                    if (ROLES_MAP[role].tendencies[f]) {
                        benchMax = Math.max(benchMax, ROLES_MAP[role].tendencies[f]);
                    }
                });
                maxVals[f] = Math.max(robotMax, benchMax, 1); 
            });

            const robotData = {
                team: targetTeam,
                matchHistory,
                roleCounts,
                avgMetrics,
                typicalRole,
                maxVals,
                isBumpRobot: matchHistory.some(m => m.is_bump),
                isTrenchRobot: matchHistory.some(m => m.is_trench),
                isDysfunctionalRobot: matchHistory.some(m => m.is_dysfunctional)
            };

            renderDashboard(robotData);
        }

        // --- 4. VISUALIZATION LOGIC (Chart.js) ---

        function renderDashboard(robot) {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('reportTitle').innerText = `TEAM ${robot.team}`;
            document.getElementById('reportSubtitle').innerText = `TYPICAL ROLE: ${robot.typicalRole}`;

            // Top-Level Capabilities
            let capsHtml = '';
            if (robot.isBumpRobot) capsHtml += `<span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-bold border border-green-200">✅ Overall Bump Bot</span>`;
            if (robot.isTrenchRobot) capsHtml += `<span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-bold border border-blue-200">✅ Overall Trench Bot</span>`;
            if (robot.isDysfunctionalRobot) capsHtml += `<span class="px-3 py-1 bg-red-100 text-red-800 rounded-full text-sm font-bold border border-red-200">⚠️ History of Dysfunctional</span>`;
            document.getElementById('robotCapabilities').innerHTML = capsHtml;

            chartInstances.forEach(c => c.destroy());
            chartInstances = [];
            document.getElementById('matchesGrid').innerHTML = '';

            const cleanLabels = NUMERIC_FIELDS.map(f => {
                return f.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            });

            // --- A. BAR CHART ---
            const ctxBar = document.getElementById('barChart').getContext('2d');
            const roles = Object.keys(robot.roleCounts);
            const counts = Object.values(robot.roleCounts);
            const barColors = roles.map(r => ROLE_COLORS[r] || ROLE_COLORS["Unknown"]);
            const borderColors = roles.map(r => r === robot.typicalRole ? '#000000' : 'transparent');
            const borderWidths = roles.map(r => r === robot.typicalRole ? 2 : 0);

            chartInstances.push(new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: roles,
                    datasets: [{
                        data: counts,
                        backgroundColor: barColors,
                        borderColor: borderColors,
                        borderWidth: borderWidths,
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y', 
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, grid: { borderDash: [4, 4] } },
                        y: { grid: { display: false } }
                    }
                }
            }));

            // --- B. AVERAGE RADAR ---
            const radarOptions = {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        min: 0, max: 1, ticks: { display: false },
                        pointLabels: { font: { size: 10, family: 'Inter' }, color: '#64748b' },
                    }
                },
                plugins: { 
                    legend: { 
                        display: true, 
                        position: 'bottom',
                        labels: { boxWidth: 12, font: { size: 10 } }
                    } 
                }
            };

            const ctxAvg = document.getElementById('avgRadarChart').getContext('2d');
            const normalizedAvgs = NUMERIC_FIELDS.map(f => robot.avgMetrics[f] / robot.maxVals[f]);
            const avgColorHex = ROLE_COLORS[robot.typicalRole] || ROLE_COLORS["Unknown"];

            let avgDatasets = [{
                label: 'Season Average',
                data: normalizedAvgs,
                backgroundColor: avgColorHex.replace('1)', '0.3)'),
                borderColor: avgColorHex,
                borderWidth: 3,
                pointBackgroundColor: avgColorHex
            }];

            // Overlay all 3 benchmarks on the season average chart
            Object.keys(ROLES_MAP).forEach(roleName => {
                let bData = NUMERIC_FIELDS.map(f => (ROLES_MAP[roleName].tendencies[f] || 0) / robot.maxVals[f]);
                avgDatasets.push({
                    label: roleName + ' Benchmark',
                    data: bData,
                    borderColor: ROLE_COLORS[roleName],
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    borderDash: [4, 4],
                    pointRadius: 0
                });
            });

            chartInstances.push(new Chart(ctxAvg, {
                type: 'radar',
                data: {
                    labels: cleanLabels,
                    datasets: avgDatasets
                },
                options: radarOptions
            }));

            // --- C. INDIVIDUAL MATCH RADARS & EFFICIENCY ---
            const gridEl = document.getElementById('matchesGrid');
            
            robot.matchHistory.forEach((match, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm p-4 border border-slate-200 h-auto min-h-[380px] flex flex-col";
                const colorHex = ROLE_COLORS[match.assigned_role] || ROLE_COLORS["Unknown"];
                
                // Construct Per-Match Checkmarks
                let matchBadges = '';
                if (match.is_bump) matchBadges += `<span class="px-2 py-0.5 bg-green-100 text-green-800 rounded text-[10px] font-bold border border-green-200 mr-1">✅ Bump</span>`;
                if (match.is_trench) matchBadges += `<span class="px-2 py-0.5 bg-blue-100 text-blue-800 rounded text-[10px] font-bold border border-blue-200 mr-1">✅ Trench</span>`;
                if (match.is_dysfunctional) matchBadges += `<span class="px-2 py-0.5 bg-red-100 text-red-800 rounded text-[10px] font-bold border border-red-200">⚠️ Dysfunc</span>`;

                // Formatting helpers for Efficiency
                const fmt = (val) => val !== null ? val.toFixed(1) + 's' : 'N/A';

                card.innerHTML = `
                    <div class="text-center mb-2">
                        <div class="font-bold text-slate-800">Match ${match.match_number}</div>
                        <div class="text-xs font-bold" style="color: ${colorHex}">${match.assigned_role} (Score: ${match.role_score})</div>
                        <div class="mt-1 h-5">${matchBadges}</div>
                    </div>
                    <div class="flex-grow relative min-h-[200px] mb-4">
                        <canvas id="matchChart_${index}"></canvas>
                    </div>
                    <div class="mt-auto bg-slate-50 border border-slate-200 rounded p-2">
                        <div class="text-[10px] uppercase font-bold text-slate-500 mb-1 text-center border-b border-slate-200 pb-1">Efficiency (Sec/Action)</div>
                        <div class="grid grid-cols-2 gap-1 text-xs text-slate-700">
                            <div>🎯 Score: <span class="font-bold">${fmt(match.scoring_eff)}</span></div>
                            <div>🚜 Trav: <span class="font-bold">${fmt(match.traversal_eff)}</span></div>
                            <div>🏈 Pass: <span class="font-bold">${fmt(match.passing_eff)}</span></div>
                            <div>🛡️ Def: <span class="font-bold">${fmt(match.defense_eff)}</span></div>
                        </div>
                    </div>
                `;
                gridEl.appendChild(card);

                // Draw Chart
                const ctxM = document.getElementById(`matchChart_${index}`).getContext('2d');
                const normalizedMatchData = NUMERIC_FIELDS.map(f => match[f] / robot.maxVals[f]);

                let matchDatasets = [{
                    label: 'Match Data',
                    data: normalizedMatchData,
                    backgroundColor: colorHex.replace('1)', '0.15)'),
                    borderColor: colorHex,
                    borderWidth: 2,
                    pointRadius: 2,
                    pointBackgroundColor: colorHex
                }];

                // Overlay ONLY the benchmark for the role they played this match
                if (match.assigned_role !== "Unknown" && ROLES_MAP[match.assigned_role]) {
                    let roleName = match.assigned_role;
                    let bData = NUMERIC_FIELDS.map(f => (ROLES_MAP[roleName].tendencies[f] || 0) / robot.maxVals[f]);
                    matchDatasets.push({
                        label: roleName + ' Benchmark',
                        data: bData,
                        borderColor: ROLE_COLORS[roleName],
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        borderDash: [4, 4],
                        pointRadius: 0
                    });
                }

                chartInstances.push(new Chart(ctxM, {
                    type: 'radar',
                    data: {
                        labels: cleanLabels,
                        datasets: matchDatasets
                    },
                    options: {
                        ...radarOptions,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'bottom',
                                labels: { boxWidth: 10, font: { size: 8 } }
                            }
                        },
                        scales: {
                            r: {
                                ...radarOptions.scales.r,
                                pointLabels: { font: { size: 8 } }
                            }
                        }
                    }
                }));
            });
        }
    </script>
</body>
</html>
